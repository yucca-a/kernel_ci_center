name: upstream-check
# Weekly: detect when tracked upstreams have advanced past our pinned commits/blobs
# and ping a tracker issue. Does NOT auto-merge — adopting an update needs a
# re-vendor/re-pin + rebuild (and for SUSFS, the selinuxfs neutralisation
# re-verified). ReSukiSU is tracked at build time (auto-latest), reported for info.
#   - SUSFS   : ShirkNeko/susfs4ksu branch tips vs our commit pins
#   - ReKernel: Sakion-Team/Re-Kernel LKM-Source/{rekernel.c,rekernel.h} blob vs our pins
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check upstream SUSFS / ReKernel / ReSukiSU
        run: |
          set -euo pipefail
          # Our pinned SUSFS commits — keep in sync with the kernel build scripts
          # (sm8550 common.sh, sm8650/sm8750 apply_features.sh).
          declare -A PIN=(
            [gki-android13-5.15]=33b1d620eb218a8d64c828efff2b4dab1cb4742b
            [gki-android14-6.1]=4a1e8311ae24bffb82c97b15945a7d94bf04cf90
            [gki-android15-6.6]=84c8fd6929c0f9a0cdd78f707599b6d76f415d37
          )
          report=""; updated=0
          for br in gki-android13-5.15 gki-android14-6.1 gki-android15-6.6; do
            pin="${PIN[$br]}"
            # Compare our pin (base) vs the branch tip (head). status "ahead" means
            # the branch has commits we don't -> a real update; "diverged" means
            # both moved (review); "identical"/"behind" -> our pin is fine.
            line=$(gh api "repos/ShirkNeko/susfs4ksu/compare/${pin}...${br}" \
                     --jq '.status + " " + (.ahead_by|tostring)' 2>/dev/null || echo "error 0")
            status="${line%% *}"; ahead="${line##* }"
            case "$status" in
              ahead|diverged)
                report="${report}- SUSFS \`$br\`: branch is **${status}** by ${ahead} commit(s) vs pin \`${pin:0:12}\` — **UPDATE AVAILABLE**"$'\n'
                updated=1 ;;
              identical|behind)
                report="${report}- SUSFS \`$br\`: pin current (${status})"$'\n' ;;
              *)
                report="${report}- SUSFS \`$br\`: compare error (skipped)"$'\n' ;;
            esac
          done

          # ReKernel — vendored single-file LKM source (Sakion-Team/Re-Kernel),
          # built-in across all three kernels (sm8650/sm8750 build/features/rekernel,
          # sm8550 drivers/rekernel). Pin = git blob SHA of the upstream LKM-Source
          # files we last synced; an upstream blob change == a new Re:Kernel revision.
          REKERNEL_PIN_C=c482a2e169b0660189049f644534b1cf95600d0d
          REKERNEL_PIN_H=9bbbb59f55dc22f322bfb45a5be6440a78301f88
          rk_c=$(gh api "repos/Sakion-Team/Re-Kernel/contents/LKM-Source/rekernel.c" --jq '.sha' 2>/dev/null || echo error)
          rk_h=$(gh api "repos/Sakion-Team/Re-Kernel/contents/LKM-Source/rekernel.h" --jq '.sha' 2>/dev/null || echo error)
          rk_ver=$(gh api -H "Accept: application/vnd.github.raw" "repos/Sakion-Team/Re-Kernel/contents/LKM-Source/rekernel.c" 2>/dev/null | grep -oE 'Re:Kernel v[0-9.]+' | head -1 || true)
          if [ "$rk_c" = "error" ] || [ "$rk_h" = "error" ]; then
            report="${report}- ReKernel: compare error (skipped)"$'\n'
          elif [ "$rk_c" != "$REKERNEL_PIN_C" ] || [ "$rk_h" != "$REKERNEL_PIN_H" ]; then
            report="${report}- ReKernel \`LKM-Source\`: upstream changed (now ${rk_ver:-?}) vs pin \`${REKERNEL_PIN_C:0:12}\` — **UPDATE AVAILABLE**"$'\n'
            updated=1
          else
            report="${report}- ReKernel \`LKM-Source\`: pin current (${rk_ver:-v9.2})"$'\n'
          fi

          ksu=$(git ls-remote https://github.com/ReSukiSU/ReSukiSU.git refs/heads/main | cut -f1)
          report="${report}- ReSukiSU \`main\`: \`${ksu:0:12}\` (tracked at build time — auto-latest)"$'\n'
          printf '%s\n' "$report"

          title="🔔 Upstream update available (SUSFS / ReKernel)"
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "in:title $title" --json number --jq '.[0].number // empty' || true)
          if [ "$updated" = "1" ]; then
            body=$(printf 'Automated weekly upstream check (%s UTC).\n\n%s\nTo adopt an update:\n- SUSFS: bump SUSFS_PIN in the kernel build scripts, re-verify the selinuxfs neutralisation (ReSukiSU drops the fake-selinux-status symbols), then rebuild and flash-test.\n- ReKernel: re-vendor LKM-Source/rekernel.{c,h} into build/features/rekernel (sm8650/sm8750) + drivers/rekernel (sm8550), bump REKERNEL_PIN_C/H in this workflow, then rebuild.' "$(date -u +%F)" "$report")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" -R "${{ github.repository }}" --body "$body"
              echo "Updated tracker issue #$existing"
            else
              gh issue create -R "${{ github.repository }}" --title "$title" --body "$body"
            fi
          else
            echo "No SUSFS/ReKernel updates beyond our pins."
            [ -n "$existing" ] && gh issue close "$existing" -R "${{ github.repository }}" -c "All tracked upstreams back in sync with our pins." || true
          fi
