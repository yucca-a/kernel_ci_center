name: upstream-check
# Weekly: detect when upstream SUSFS (ShirkNeko branches) has advanced past our
# pinned commits, and ping a tracker issue. Does NOT auto-merge — bumping SUSFS
# needs the selinuxfs neutralisation re-verified + a rebuild. ReSukiSU is tracked
# at build time (auto-latest), so it is reported for info only.
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check upstream SUSFS / ReSukiSU
        run: |
          set -euo pipefail
          # Our pinned SUSFS commits — keep in sync with the kernel build scripts
          # (sm8550 common.sh, sm8650/sm8750 apply_features.sh).
          declare -A PIN=(
            [gki-android13-5.15]=529919fbc9f8aee6ee70eb3a8890ef33af0a109c
            [gki-android14-6.1]=d1327b62e0854603cfc26e2226e0a993ec9b0656
            [gki-android15-6.6]=676d202ed2cc322a2f90bcb2b56bc4f6a864acb8
          )
          report=""; updated=0
          for br in gki-android13-5.15 gki-android14-6.1 gki-android15-6.6; do
            pin="${PIN[$br]}"
            # Compare our pin (base) vs the branch tip (head). status "ahead" means
            # the branch has commits we don't -> a real update; "diverged" means
            # both moved (review); "identical"/"behind" -> our pin is fine.
            line=$(gh api "repos/ShirkNeko/susfs4ksu/compare/${pin}...${br}" \
                     --jq '.status + " " + (.ahead_by|tostring)' 2>/dev/null || echo "error 0")
            status="${line%% *}"; ahead="${line##* }"
            case "$status" in
              ahead|diverged)
                report="${report}- SUSFS \`$br\`: branch is **${status}** by ${ahead} commit(s) vs pin \`${pin:0:12}\` — **UPDATE AVAILABLE**"$'\n'
                updated=1 ;;
              identical|behind)
                report="${report}- SUSFS \`$br\`: pin current (${status})"$'\n' ;;
              *)
                report="${report}- SUSFS \`$br\`: compare error (skipped)"$'\n' ;;
            esac
          done
          ksu=$(git ls-remote https://github.com/ReSukiSU/ReSukiSU.git refs/heads/main | cut -f1)
          report="${report}- ReSukiSU \`main\`: \`${ksu:0:12}\` (tracked at build time — auto-latest)"$'\n'
          printf '%s\n' "$report"

          title="🔔 Upstream SUSFS update available"
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "in:title $title" --json number --jq '.[0].number // empty' || true)
          if [ "$updated" = "1" ]; then
            body=$(printf 'Automated weekly upstream check (%s UTC).\n\n%s\nTo adopt an update: bump SUSFS_PIN in the kernel build scripts, re-verify the\nselinuxfs neutralisation (ReSukiSU drops the fake-selinux-status symbols), then\nrebuild and flash-test.' "$(date -u +%F)" "$report")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" -R "${{ github.repository }}" --body "$body"
              echo "Updated tracker issue #$existing"
            else
              gh issue create -R "${{ github.repository }}" --title "$title" --body "$body"
            fi
          else
            echo "No SUSFS updates beyond our pins."
            [ -n "$existing" ] && gh issue close "$existing" -R "${{ github.repository }}" -c "All SUSFS branches back in sync with our pins." || true
          fi
